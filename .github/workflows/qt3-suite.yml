name: QT3 Rumble Test Suite

on:
  workflow_call:
    inputs:
      tested_parser:
        description: Parser to use (jsoniq or xquery)
        required: false
        type: string
        default: jsoniq
      rumble_artifact_name:
        description: Arifact name with Rumble build
        required: true
        type: string
      baseline_run_id:
        description: Exact GitHub workflow run id whose Surefire artifact should be used as baseline for regression reporting
        required: false
        type: string
      mvn_args:
        description: Extra Maven args (e.g. -Dtest=Prod1Test)
        required: false
        type: string
        default: ""
    outputs:
      ci_comment:
        description: Markdown CI comment generated from the analysis report
        value: ${{ jobs.analysis.outputs.ci_comment }}
    secrets: {}

permissions:
  contents: read
  actions: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.tested_parser }}
  cancel-in-progress: true

env:
  TESTED_PARSER: ${{ inputs.tested_parser }}
  JAVA_VERSION: "17"
  PYTHON_VERSION: "3.14"
  NODE_VERSION: "26"

jobs:
  tests:
    name: Run test suite (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          [
            AppTest,
            ArrayTest,
            Fn1Test,
            Fn2Test,
            MapTest,
            MathTest,
            MiscTest,
            OpTest,
            Prod1Test,
            Prod2Test,
            SerTest,
            XsTest,
          ]
    steps:
      - name: Checkout test harness (this repo)
        uses: actions/checkout@v6
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}

      - name: Download RumbleDB target
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.rumble_artifact_name }}
          path: rumble/target

      - name: (DEBUG) List rumble/target
        run: ls -R rumble

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run Maven tests
        shell: bash
        run: |
          if [[ -n "${{ inputs.mvn_args }}" ]]; then
            MVN_ARGS="${{ inputs.mvn_args }}"
          else
            MVN_ARGS="-Dtest=${{ matrix.suite }}"
          fi
          mvn -B -q -Dparser="${TESTED_PARSER}" ${MVN_ARGS} test || true

      - name: Upload reports (per suite)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-${{ inputs.tested_parser }}-${{ matrix.suite }}
          path: |
            target/surefire-reports/*.xml
          retention-days: 7

  analysis:
    name: Generate analysis
    needs: [tests]
    runs-on: ubuntu-latest
    outputs:
      ci_comment: ${{ steps.ci_comment.outputs.ci_comment }}
    steps:
      - name: Checkout test harness (this repo)
        uses: actions/checkout@v6
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          fetch-depth: 2

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Download Surefire artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: surefire-${{ inputs.tested_parser }}-*
          path: surefire-reports
          merge-multiple: true

      - name: Download baseline Surefire reports
        if: inputs.baseline_run_id != ''
        uses: actions/download-artifact@v8
        with:
          name: surefire-all-${{ inputs.tested_parser }}
          path: baseline-surefire-reports
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.baseline_run_id }}

      - name: Download RumbleDB target
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.rumble_artifact_name }}
          path: rumble/target

      - name: Download QT3 test suite
        shell: bash
        run: ./get-tests-repository.sh

      - name: Generate analysis
        shell: bash
        run: |
          mvn -B compile
          if [[ -n "${{ inputs.baseline_run_id }}" ]]; then
            echo "Baseline ID: ${{ inputs.baseline_run_id }}"
            echo "Performing regression analysis"
            mvn -B exec:java@analytics -Dexec.args="baseline-surefire-reports surefire-reports"
          else
            echo "No baseline ID provided"
            echo "Performing standard analysis"
            mvn -B exec:java@analytics -Dexec.args="surefire-reports"
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: analytics/ui/pnpm-lock.yaml

      - name: Install dashboard dependencies
        shell: bash
        working-directory: analytics/ui
        run: pnpm install --frozen-lockfile

      - name: Build dashboard
        shell: bash
        working-directory: analytics/ui
        run: pnpm build:report ../../analytics-results/analysis.json

      - name: Rename dashboard artifact file
        shell: bash
        working-directory: analytics/ui/dist
        run: cp index.html analytics-${{ inputs.tested_parser }}.html

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate CI comment
        id: ci_comment
        shell: bash
        run: |
          args=(
            --analysis-json analytics-results/analysis.json
            --parser "${{ inputs.tested_parser }}"
            --run-id "${{ github.run_id }}"
            --repo-owner "${{ github.repository_owner }}"
            --repo-name "${{ github.event.repository.name }}"
          )
          if [[ -n "${{ inputs.baseline_run_id }}" ]]; then
            args+=(--baseline-run-id "${{ inputs.baseline_run_id }}")
          fi

          python3 .github/workflows/scripts/ci_comment.py "${args[@]}" > ci-comment.md
          {
            echo "ci_comment<<EOF"
            cat ci-comment.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload analysis
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: analysis-${{ inputs.tested_parser }}
          path: |
            analytics-results
          retention-days: 7

      - name: Upload dashboard report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-${{ inputs.tested_parser }}
          path: analytics/ui/dist/analytics-${{ inputs.tested_parser }}.html
          archive: false
          retention-days: 7

      - name: Upload merged Surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-all-${{ inputs.tested_parser }}
          path: |
            surefire-reports/*.xml
          retention-days: 7
